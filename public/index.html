<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PromptArena — Арена промптов</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
    <style>
        /* ============================================================
           ОБЩИЕ СТИЛИ
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        :root {
            --bg-body: #0d1117;
            --bg-card: #161b22;
            --bg-card-hover: #1c2333;
            --bg-input: #0d1117;
            --border-color: #21262d;
            --border-hover: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #484f58;
            --text-on-accent: #ffffff;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            --shadow-hover: 0 8px 32px rgba(0, 0, 0, 0.5);
            --gradient: linear-gradient(135deg, #388bfd, #58a6ff);
            --accent-blue: #58a6ff;
            --accent-cyan: #79c0ff;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .header .logo-icon { font-size: 32px; line-height: 1; }
        .header h1 {
            font-size: 34px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #79c0ff, #388bfd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header .badge {
            color: var(--accent-blue);
            font-size: 13px;
            font-weight: 500;
            background: rgba(56, 139, 253, 0.1);
            padding: 6px 18px;
            border-radius: 20px;
            border: 1px solid rgba(56, 139, 253, 0.15);
        }
        .subhead {
            color: var(--text-secondary);
            margin-bottom: 32px;
            font-size: 18px;
            font-weight: 400;
            border-left: 3px solid var(--accent-blue);
            padding-left: 20px;
        }
        .subhead strong { color: var(--text-primary); font-weight: 500; }

        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 32px;
            background: var(--bg-card);
            border-radius: 12px;
            padding: 4px;
            border: 1px solid var(--border-color);
        }
        .tab-btn {
            flex: 1;
            padding: 12px 24px;
            background: transparent;
            border: none;
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .tab-btn:hover { color: var(--text-primary); background: rgba(56, 139, 253, 0.05); }
        .tab-btn.active {
            background: var(--gradient);
            color: var(--text-on-accent);
            box-shadow: 0 4px 16px rgba(56, 139, 253, 0.2);
        }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* БИБЛИОТЕКА */
        .prompt-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .prompt-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.25s ease;
            box-shadow: var(--shadow);
        }
        .prompt-card:hover {
            border-color: var(--border-hover);
            background: var(--bg-card-hover);
            box-shadow: var(--shadow-hover);
        }
        .prompt-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 6px;
        }
        .prompt-name { font-size: 18px; font-weight: 600; color: var(--text-primary); }
        .prompt-rating {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: var(--text-secondary);
            white-space: nowrap;
        }
        .prompt-rating .stars { color: #fbbf24; font-weight: 600; }
        .prompt-rating .likes { display: flex; align-items: center; gap: 4px; }
        .prompt-meta {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }
        .prompt-meta .category {
            background: rgba(56, 139, 253, 0.08);
            color: var(--accent-blue);
            padding: 2px 12px;
            border-radius: 12px;
            border: 1px solid rgba(56, 139, 253, 0.08);
            font-weight: 500;
        }
        .prompt-description {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 12px;
        }
        .prompt-body {
            display: none;
            background: var(--bg-input);
            border-radius: 8px;
            padding: 14px 16px;
            margin: 12px 0;
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-secondary);
            border-left: 3px solid var(--accent-blue);
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 200px;
            overflow-y: auto;
        }
        .prompt-body.open { display: block; }
        .prompt-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 4px;
        }
        .prompt-actions button {
            padding: 6px 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .prompt-actions button:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-hover);
            color: var(--text-primary);
        }
        .prompt-actions .btn-copy {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }
        .prompt-actions .btn-copy:hover { background: rgba(56, 139, 253, 0.1); }
        .prompt-actions .btn-arena {
            background: var(--gradient);
            color: var(--text-on-accent);
            border: none;
        }
        .prompt-actions .btn-arena:hover { opacity: 0.9; transform: scale(1.02); }
        .prompt-actions .btn-toggle { color: var(--accent-cyan); }
        .prompt-actions .btn-like { color: #fbbf24; }
        .prompt-actions .btn-like:hover { background: rgba(251, 191, 36, 0.08); }

        /* АРЕНА */
        .arena-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        @media (max-width: 900px) { .arena-layout { grid-template-columns: 1fr; } }
        .arena-left {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .arena-right {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .arena-section {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow);
        }
        .arena-section h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 14px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .arena-section h3 .count {
            font-size: 13px;
            font-weight: 400;
            color: var(--text-muted);
            margin-left: auto;
        }
        .arena-section textarea {
            width: 100%;
            height: 140px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 14px;
            color: var(--text-primary);
            font-size: 15px;
            font-family: inherit;
            resize: vertical;
            transition: border 0.2s;
        }
        .arena-section textarea:focus {
            border-color: var(--accent-blue);
            outline: none;
        }
        .arena-section textarea::placeholder { color: var(--text-muted); }

        .mode-toggle {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            background: var(--bg-input);
            border-radius: 10px;
            padding: 4px;
            border: 1px solid var(--border-color);
        }
        .mode-btn {
            flex: 1;
            padding: 10px 16px;
            background: transparent;
            border: none;
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        .mode-btn:hover { color: var(--text-primary); }
        .mode-btn.active {
            background: var(--gradient);
            color: var(--text-on-accent);
            box-shadow: 0 4px 12px rgba(56, 139, 253, 0.2);
        }

        .agent-checkbox-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 340px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .agent-checkbox-list::-webkit-scrollbar { width: 4px; }
        .agent-checkbox-list::-webkit-scrollbar-thumb {
            background: var(--border-hover);
            border-radius: 4px;
        }
        .agent-checkbox-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            background: var(--bg-input);
            border-radius: 10px;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
            cursor: pointer;
        }
        .agent-checkbox-item:hover {
            border-color: var(--border-hover);
            background: var(--bg-card-hover);
        }
        .agent-checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent-blue);
            cursor: pointer;
            flex-shrink: 0;
        }
        .agent-checkbox-item .info {
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        .agent-checkbox-item .info .name {
            font-weight: 500;
            color: var(--text-primary);
            font-size: 15px;
        }
        .agent-checkbox-item .info .tags {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .agent-checkbox-item .info .tags span {
            background: rgba(56, 139, 253, 0.06);
            padding: 0 8px;
            border-radius: 8px;
            color: var(--accent-blue);
        }
        .agent-checkbox-item .meta {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            color: var(--text-muted);
            flex-shrink: 0;
        }
        .agent-checkbox-item .meta .rating { color: #fbbf24; font-weight: 600; }
        .agent-checkbox-item.disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .single-prompt-area { display: none; }
        .single-prompt-area.visible { display: block; }
        .single-prompt-area textarea {
            width: 100%;
            height: 140px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 14px;
            color: var(--text-primary);
            font-size: 15px;
            font-family: inherit;
            resize: vertical;
            transition: border 0.2s;
        }
        .single-prompt-area textarea:focus {
            border-color: var(--accent-blue);
            outline: none;
        }
        .single-prompt-area textarea::placeholder { color: var(--text-muted); }

        .btn-compare, .btn-evaluate {
            width: 100%;
            padding: 14px;
            background: var(--gradient);
            color: var(--text-on-accent);
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(56, 139, 253, 0.15);
            margin-top: 6px;
        }
        .btn-compare:hover, .btn-evaluate:hover {
            transform: scale(1.01);
            box-shadow: 0 8px 30px rgba(56, 139, 253, 0.25);
        }
        .btn-compare:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .results-table-wrap { overflow-x: auto; }
        .results-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            min-width: 700px;
        }
        .results-table th {
            text-align: left;
            padding: 10px 12px;
            color: var(--text-muted);
            font-weight: 500;
            border-bottom: 2px solid var(--border-color);
            white-space: nowrap;
        }
        .results-table td {
            padding: 12px 12px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-secondary);
        }
        .results-table .winner {
            background: rgba(56, 139, 253, 0.05);
            border-left: 3px solid var(--accent-blue);
        }
        .results-table .agent-name { color: var(--text-primary); font-weight: 500; }
        .results-table .accuracy { font-weight: 600; }
        .results-table .badge-winner {
            background: rgba(251, 191, 36, 0.12);
            color: #fbbf24;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
        }
        .results-table .token-cell { font-family: monospace; font-size: 13px; color: var(--accent-cyan); }

        .results-insights {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-top: 20px;
            padding: 16px 20px;
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }
        .results-insights .insight {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .results-insights .insight .label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .results-insights .insight .value {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .results-insights .insight .value .highlight { color: #fbbf24; }

        .single-result-answer {
            background: var(--bg-input);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 16px;
            border-left: 3px solid var(--accent-blue);
        }
        .single-result-answer .label {
            color: var(--text-muted);
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .single-result-answer .content {
            white-space: pre-wrap;
            color: var(--text-primary);
            font-size: 14px;
            line-height: 1.6;
            max-height: 300px;
            overflow-y: auto;
        }
        .judge-score-box {
            background: var(--bg-card);
            padding: 12px 20px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }
        .judge-score-box .label {
            font-size: 12px;
            color: var(--text-muted);
        }
        .judge-score-box .score {
            font-size: 28px;
            font-weight: 700;
        }

        @media (max-width: 640px) {
            .header h1 { font-size: 24px; }
            .prompt-grid { grid-template-columns: 1fr; }
            .arena-layout { grid-template-columns: 1fr; }
            .tabs { flex-direction: column; }
            .tab-btn { text-align: center; }
            .prompt-actions { flex-wrap: wrap; }
            .results-table { font-size: 12px; min-width: 600px; }
            .results-table th, .results-table td { padding: 8px 10px; }
        }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <div class="header-left">
            <span class="logo-icon">⚡</span>
            <h1>PromptArena</h1>
        </div>
        <span class="badge">Арена промптов</span>
    </div>

    <p class="subhead">
        <strong>Библиотека промптов + Арена для сравнения</strong> — выбирай, копируй, сравнивай
    </p>

    <div class="tabs">
        <button class="tab-btn active" data-tab="library">📚 Библиотека</button>
        <button class="tab-btn" data-tab="arena">⚔️ Арена</button>
    </div>

    <div id="library" class="tab-content active">
        <div class="prompt-grid" id="libraryGrid"></div>
    </div>

    <div id="arena" class="tab-content">
        <div class="arena-layout">

            <div class="arena-left">
                <div class="arena-section">
                    <div class="mode-toggle">
                        <button class="mode-btn active" data-mode="arena" onclick="switchMode('arena')">⚔️ Арена (сравнение)</button>
                        <button class="mode-btn" data-mode="single" onclick="switchMode('single')">📝 Оценка промпта</button>
                    </div>

                    <div id="arenaMode">
                        <h3>📝 Задача для агентов</h3>
                        <textarea id="taskInput" placeholder="Введи задачу, например: 'Напиши автотест для входа в систему'"></textarea>

                        <h3 style="margin-top:16px;">
                            🤖 Выбери агентов (2–3)
                            <span class="count" id="selectedCount">Выбрано: 0</span>
                        </h3>
                        <div class="agent-checkbox-list" id="agentCheckboxList"></div>
                        <button class="btn-compare" id="compareBtn" onclick="runComparison()">🔥 Сравнить выбранных</button>
                    </div>

                    <div id="singleMode" style="display:none;">
                        <h3>📝 Промпт для оценки</h3>
                        <div class="single-prompt-area visible">
                            <textarea id="singlePromptInput" placeholder="Вставьте промпт для оценки в DeepSeek..."></textarea>
                        </div>
                        <button class="btn-evaluate" onclick="evaluatePrompt()">📊 Оценить промпт</button>
                    </div>
                </div>
            </div>

            <div class="arena-right">
                <div class="arena-section">
                    <h3>🏆 Результаты</h3>
                    <div id="resultsContainer">
                        <p style="color:var(--text-muted); font-size:15px; padding:20px 0; text-align:center;">
                            Выбери режим, введи данные и нажми кнопку
                        </p>
                    </div>
                </div>
            </div>

        </div>
    </div>

</div>

<script>
    // ============================================================
    // ДАННЫЕ
    // ============================================================
    const promptsData = [{
        id: 1,
        name: "Автотест для API-логина",
        category: "QA",
        description: "Генерирует автотест на PyTest для эндпоинта /api/login",
        body: "Ты — эксперт по автоматизации тестирования с 10-летним опытом. Напиши автотест на PyTest для эндпоинта /api/login.\n\nПроверь:\n- успешный вход (200 OK, token)\n- неверный пароль (401 Unauthorized)\n- отсутствие email (400 Bad Request)\n\nИспользуй fixture, параметризацию, проверки статус-кодов и структуры ответа.",
        rating: 4.9,
        likes: 24,
        author: "qa_expert",
        is_agent: false,
        tags: ["pytest", "api", "автотесты"]
    }, {
        id: 2,
        name: "Рефакторинг легаси-кода",
        category: "Dev",
        description: "Переписывает старый код с использованием современных практик",
        body: "Ты — Senior Developer с опытом рефакторинга. Перепиши этот код так, чтобы он стал читаемым, поддерживаемым и соответствовал SOLID.\n\nКод:\n```python\ndef calc(a,b,op):\n    if op=='+': return a+b\n    if op=='-': return a-b\n    if op=='*': return a*b\n    if op=='/': return a/b\n```\n\nПокажи два варианта: с if-elif и с использованием словаря функций. Добавь обработку ошибок.",
        rating: 4.8,
        likes: 18,
        author: "dev_lead",
        is_agent: false,
        tags: ["рефакторинг", "python", "SOLID"]
    }, {
        id: 3,
        name: "Анализ логов ошибок",
        category: "DevOps",
        description: "Находит критические ошибки в логах и предлагает причины",
        body: "Ты — DevOps-инженер. Проанализируй этот фрагмент логов и найди аномалии.\n\nЛоги:\n```\n2025-01-15 10:23:45 ERROR Connection timeout to db:5432\n2025-01-15 10:23:47 WARN Retry attempt 1/3\n2025-01-15 10:23:50 ERROR Connection timeout to db:5432\n2025-01-15 10:23:52 CRITICAL Service unavailable\n```\n\nОпредели:\n- какая ошибка критическая\n- 2-3 возможные причины\n- команду для сбора доп. данных",
        rating: 4.7,
        likes: 15,
        author: "sre_team",
        is_agent: false,
        tags: ["логи", "devops", "мониторинг"]
    }, {
        id: 4,
        name: "Генератор SQL-запросов",
        category: "Dev",
        description: "Создаёт оптимизированные SQL-запросы по описанию",
        body: "Ты — SQL-эксперт. Напиши оптимизированный запрос для такой задачи:\n\nТаблицы:\n- users (id, name, email, created_at)\n- orders (id, user_id, amount, status, created_at)\n\nЗадача: получить список пользователей, у которых сумма заказов за последние 30 дней > 1000, отсортировать по сумме убывания.\n\nВыведи сам запрос и индекс, который ускорит его.",
        rating: 4.6,
        likes: 12,
        author: "data_engineer",
        is_agent: false,
        tags: ["sql", "оптимизация", "индексы"]
    }, {
        id: 5,
        name: "CodeGen Pro (агент)",
        category: "Dev",
        description: "Генерирует код по требованиям на Python/JS/Go",

    }, {
        id: 6,
        name: "QA Master (агент)",
        category: "QA",
        description: "Пишет тест-кейсы и автотесты по требованиям",
        body: "Ты — QA Lead с 10-летним опытом. По описанию функционала напиши:\n1. Чек-лист для ручного тестирования\n2. Автотесты на PyTest (API и UI)\n\nФункционал: [подставляется пользователем]",
        rating: 4.8,
        likes: 22,
        author: "system",
        is_agent: true,
        tags: ["тестирование", "pytest", "чек-листы"]
    }, {
        id: 7,
        name: "Refactor Pro (агент)",
        category: "Dev",
        description: "Рефакторит код с сохранением логики",
        body: "Ты — эксперт по рефакторингу. Улучши этот код, сохранив логику. Напиши объяснение каждого изменения.\n\nКод: [подставляется пользователем]",
        rating: 4.7,
        likes: 14,
        author: "system",
        is_agent: true,
        tags: ["рефакторинг", "чистый код"]
    }];

    // ============================================================
    // БИБЛИОТЕКА
    // ============================================================
    function renderLibrary() {
        const grid = document.getElementById('libraryGrid');
        grid.innerHTML = promptsData.map(p => `
            <div class="prompt-card" data-id="${p.id}">
                <div class="prompt-header">
                    <div class="prompt-name">${p.name}</div>
                    <div class="prompt-rating">
                        <span class="stars">⭐ ${p.rating}</span>
                        <span class="likes">❤️ ${p.likes}</span>
                    </div>
                </div>
                <div class="prompt-meta">
                    <span class="category">${p.category}</span>
                    <span class="author">👤 ${p.author}</span>
                    ${p.is_agent ? '<span style="color:var(--accent-cyan);font-weight:500;">🤖 агент</span>' : ''}
                    ${p.tags.map(t => `<span style="color:var(--text-muted);font-size:12px;">#${t}</span>`).join('')}
                </div>
                <div class="prompt-description">${p.description}</div>
                <div class="prompt-body" id="body-${p.id}">${p.body}</div>
                <div class="prompt-actions">
                    <button class="btn-toggle" onclick="toggleBody(${p.id})">▶ Показать промпт</button>
                    <button class="btn-copy" onclick="copyPrompt(${p.id})">📋 Скопировать</button>
                    <button class="btn-arena" onclick="sendToArena(${p.id})">⚔️ В Арену</button>
                    <button class="btn-like" onclick="likePrompt(${p.id})">❤️</button>
                </div>
            </div>
        `).join('');
    }

    function toggleBody(id) {
        const body = document.getElementById(`body-${id}`);
        const btn = body.closest('.prompt-card').querySelector('.btn-toggle');
        body.classList.toggle('open');
        btn.textContent = body.classList.contains('open') ? '▼ Скрыть' : '▶ Показать промпт';
    }

    function copyPrompt(id) {
        const p = promptsData.find(el => el.id === id);
        const text = p.body;
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        alert('Скопировано');
    }

    function likePrompt(id) {
        const p = promptsData.find(el => el.id === id);
        p.likes += 1;
        renderLibrary();
        renderAgentsInArena();
    }

    function sendToArena(id) {
        const p = promptsData.find(el => el.id === id);
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelector('[data-tab="arena"]').classList.add('active');
        document.getElementById('arena').classList.add('active');
        document.getElementById('taskInput').value = p.body;
        updateSelectedCount();
    }

    // ============================================================
    // АРЕНА
    // ============================================================
    function renderAgentsInArena() {
        const agents = promptsData.filter(p => p.is_agent === true);
        const list = document.getElementById('agentCheckboxList');
        list.innerHTML = agents.map(a => `
            <label class="agent-checkbox-item" data-id="${a.id}">
                <input type="checkbox" class="agent-checkbox" data-id="${a.id}" onchange="updateSelectedCount()" />
                <div class="info">
                    <div class="name">${a.name}</div>
                    <div class="tags">
                        <span>${a.category}</span>
                        ${a.tags.map(t => `<span>#${t}</span>`).join('')}
                    </div>
                </div>
                <div class="meta">
                    <span class="rating">⭐ ${a.rating}</span>
                    <span>❤️ ${a.likes}</span>
                </div>
            </label>
        `).join('');
        updateSelectedCount();
    }

    function updateSelectedCount() {
        const checkboxes = document.querySelectorAll('.agent-checkbox:checked');
        const count = checkboxes.length;
        document.getElementById('selectedCount').textContent = `Выбрано: ${count}`;
        const btn = document.getElementById('compareBtn');
        btn.disabled = count < 2 || count > 3;
        if (count < 2) btn.textContent = '🔥 Выбери 2–3 агента';
        else if (count > 3) btn.textContent = '🔥 Не больше 3';
        else btn.textContent = '🔥 Сравнить выбранных';
    }

    // ============================================================
    // ПЕРЕКЛЮЧЕНИЕ РЕЖИМОВ
    // ============================================================
    let currentMode = 'arena';

    function switchMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.querySelector(`.mode-btn[data-mode="${mode}"]`).classList.add('active');

        if (mode === 'arena') {
            document.getElementById('arenaMode').style.display = 'block';
            document.getElementById('singleMode').style.display = 'none';
        } else {
            document.getElementById('arenaMode').style.display = 'none';
            document.getElementById('singleMode').style.display = 'block';
        }

        document.getElementById('resultsContainer').innerHTML = `
            <p style="color:var(--text-muted); font-size:15px; padding:20px 0; text-align:center;">
                ${mode === 'arena' ? 'Выбери агентов, введи задачу и нажми «Сравнить»' : 'Вставь промпт и нажми «Оценить промпт»'}
            </p>
        `;
    }

    // ============================================================
    // СРАВНЕНИЕ (АРЕНА)
    // ============================================================
    async function runComparison() {
        const task = document.getElementById('taskInput').value.trim();
        if (!task) { alert('Введи задачу для агентов!'); return; }

        const selected = document.querySelectorAll('.agent-checkbox:checked');
        if (selected.length < 2 || selected.length > 3) { alert('Выбери 2 или 3 агента'); return; }

        const agentIds = Array.from(selected).map(cb => parseInt(cb.dataset.id));
        const container = document.getElementById('resultsContainer');
        container.innerHTML = `<div style="text-align:center;padding:30px 0;color:var(--text-secondary);">⏳ Отправка запроса к DeepSeek через сервер...</div>`;

        try {
            const response = await fetch('http://localhost:3001/api/arena/compare', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ task, agent_ids: agentIds })
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error || 'Ошибка сервера');
            }

            const data = await response.json();
            renderResults(data.results, data.task);

        } catch (error) {
            container.innerHTML = `<div style="color:#f87171;padding:20px;text-align:center;">❌ Ошибка: ${error.message}</div>`;
        }
    }

    function renderResults(results, task) {
        const container = document.getElementById('resultsContainer');
        const mostEfficient = results.reduce((a, b) => a.total_tokens < b.total_tokens ? a : b);
        const bestAccuracyPerToken = results.reduce((a, b) =>
            (a.accuracy / a.total_tokens) > (b.accuracy / b.total_tokens) ? a : b
        );

        const rows = results.map(r => `
            <tr class="${r.is_winner ? 'winner' : ''}">
                <td>
                    ${r.is_winner ? '🥇 ' : ''}
                    <span class="agent-name">${r.name}</span>
                    ${r.is_winner ? '<span class="badge-winner">ПОБЕДИТЕЛЬ</span>' : ''}
                </td>
                <td class="accuracy" style="color:${r.accuracy > 9 ? '#4ade80' : r.accuracy > 8 ? '#fbbf24' : '#f87171'}">
                    ${r.accuracy}/10
                </td>
                <td>${r.speed}с</td>
                <td>$${r.price}</td>
                <td class="token-cell">${r.prompt_tokens.toLocaleString()}</td>
                <td class="token-cell">${r.completion_tokens.toLocaleString()}</td>
                <td class="token-cell" style="font-weight:600;color:${r.total_tokens === Math.min(...results.map(x => x.total_tokens)) ? '#4ade80' : '#fbbf24'}">
                    ${r.total_tokens.toLocaleString()} ${r.total_tokens === Math.min(...results.map(x => x.total_tokens)) ? '⬇️' : ''}
                </td>
                <td style="font-size:13px;color:var(--text-muted);max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
                    ${r.answer.substring(0, 40)}...
                </td>
            </tr>
        `).join('');

        container.innerHTML = `
            <div style="margin-bottom:14px;font-size:14px;color:var(--text-secondary);">
                📌 Задача: «${task.substring(0, 120)}${task.length > 120 ? '...' : ''}»
            </div>
            <div class="results-table-wrap">
                <table class="results-table">
                    <thead><tr>
                        <th>Агент</th><th>Точн.</th><th>Время</th><th>Цена</th>
                        <th>Вход 🔹</th><th>Выход 🔸</th><th>Всего</th><th>Ответ (кратко)</th>
                    </tr></thead>
                    <tbody>${rows}</tbody>
                </table>
            </div>
            <div class="results-insights">
                <div class="insight"><span class="label">🏆 Победитель</span><span class="value">${results[0].name}</span></div>
                <div class="insight"><span class="label">💰 Самый экономичный (токены)</span><span class="value">${mostEfficient.name} — <span class="highlight">${mostEfficient.total_tokens.toLocaleString()}</span></span></div>
                <div class="insight"><span class="label">⚡ Лучшее соотношение точность/токены</span><span class="value">${bestAccuracyPerToken.name} — <span class="highlight">${(bestAccuracyPerToken.accuracy / bestAccuracyPerToken.total_tokens * 1000).toFixed(2)}</span></span></div>
                <div class="insight"><span class="label">📊 Средний размер промпта</span><span class="value">${Math.round(results.reduce((s, r) => s + r.prompt_tokens, 0) / results.length).toLocaleString()}</span></div>
            </div>
            <div style="margin-top:14px;font-size:13px;color:var(--text-muted);">
                ⚡ Сравнение выполнено через <strong style="color:var(--accent-blue);">DeepSeek Flash</strong> (бесплатно, $0.14 / 1M токенов)
            </div>
        `;
    }

    // ============================================================
    // ОЦЕНКА ПРОМПТА (С СУДЬЕЙ)
    // ============================================================
    async function evaluatePrompt() {
        const prompt = document.getElementById('singlePromptInput').value.trim();
        if (!prompt) { alert('Вставьте промпт для оценки!'); return; }

        const container = document.getElementById('resultsContainer');
        container.innerHTML = `<div style="text-align:center;padding:30px 0;color:var(--text-secondary);">⏳ Отправка промпта в DeepSeek...</div>`;

        try {
            const response = await fetch('http://localhost:3001/api/prompt/evaluate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt })
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error || 'Ошибка сервера');
            }

            const data = await response.json();

            container.innerHTML = `
                <div style="margin-bottom:14px;font-size:14px;color:var(--text-secondary);">
                    📌 Результат оценки промпта
                </div>
                <div style="display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap;">
                    <div class="judge-score-box">
                        <div class="label">Оценка судьи</div>
                        <div class="score" style="color:${data.judge_score >= 8 ? '#4ade80' : data.judge_score >= 6 ? '#fbbf24' : '#f87171'}">
                            ${data.judge_score}/10
                        </div>
                    </div>
                    <div style="background:var(--bg-card);padding:12px 20px;border-radius:10px;border:1px solid var(--border-color);flex:1;">
                        <div style="font-size:12px;color:var(--text-muted);">Комментарий судьи</div>
                        <div style="font-size:14px;color:var(--text-primary);">${data.judge_comment}</div>
                    </div>
                </div>
                <div class="single-result-answer">
                    <div class="label">Ответ DeepSeek:</div>
                    <div class="content">${data.answer}</div>
                </div>
                <div class="results-insights">
                    <div class="insight"><span class="label">⚡ Время</span><span class="value">${data.speed}с</span></div>
                    <div class="insight"><span class="label">💰 Цена</span><span class="value">$${data.price}</span></div>
                    <div class="insight"><span class="label">🔹 Входные токены</span><span class="value">${data.prompt_tokens.toLocaleString()}</span></div>
                    <div class="insight"><span class="label">🔸 Выходные токены</span><span class="value">${data.completion_tokens.toLocaleString()}</span></div>
                    <div class="insight"><span class="label">📊 Всего токенов</span><span class="value">${data.total_tokens.toLocaleString()}</span></div>
                </div>
                <div style="margin-top:14px;font-size:13px;color:var(--text-muted);">
                    ⚡ Оценка выполнена через <strong style="color:var(--accent-blue);">DeepSeek Flash</strong>
                </div>
            `;

        } catch (error) {
            container.innerHTML = `<div style="color:#f87171;padding:20px;text-align:center;">❌ Ошибка: ${error.message}</div>`;
        }
    }

    // ============================================================
    // ВКЛАДКИ
    // ============================================================
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            this.classList.add('active');
            document.getElementById(this.dataset.tab).classList.add('active');
        });
    });

    // ============================================================
    // СТАРТ
    // ============================================================
    renderLibrary();
    renderAgentsInArena();
    switchMode('arena');

    if (window.location.search.includes('arena')) {
        document.querySelector('[data-tab="arena"]').click();
    }
</script>
</body>
</html>
